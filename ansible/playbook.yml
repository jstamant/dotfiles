- hosts: localhost

  vars:
    my_user: "jstamant"
    my_hostname: "navy"
    enabled_systemd_services: []



  roles:
    - backup
    - immich
    - jellyfin
    - tailscale

    - role: kmonad
      vars:
        kmonad_user: "{{ my_user }}"
    - role: user_environment
      vars:
        user_env_user: "{{ my_user }}"
        user_env_dotfiles_repo: "git@github.com:jstamant/dotfiles.git"



  tasks:
    - name: Set the system hostname
      become: yes
      ansible.builtin.hostname:
        name: "{{ my_hostname }}"

    - name: Install system packages
      become: yes
      ansible.builtin.package:
        state: present
        name:
          - emacs-pgtk
          - neovim

    - name: Install battery limit service
      become: yes
      ansible.builtin.copy:
        src: battery-limit.service
        dest: /etc/systemd/system/battery-limit.service
        owner: root
        group: root
        mode: '644'
      notify: Reload systemd

    - name: Install Syncthing
      become: yes
      ansible.builtin.package:
        name: syncthing
        state: present

    - name: Enable Syncthing
      become: yes
      become_user: "{{ my_user }}"
      ansible.builtin.systemd:
        name: syncthing.service
        enabled: true
        scope: user

    - name: Add Insync repo
      become: yes
      ansible.builtin.copy:
        dest: /etc/yum.repos.d/insync.repo
        content: |
          [insync]
          name=insync repo
          baseurl=http://yum.insync.io/fedora/$releasever/
          gpgcheck=1
          gpgkey=https://d2t3ff60b2tol4.cloudfront.net/repomd.xml.key
          enabled=1
          metadata_expire=120m
        owner: root
        group: root
        mode: '644'

    - name: Install Insync
      become: yes
      ansible.builtin.dnf:
        name: https://cdn.insynchq.com/builds/linux/3.9.8.60034/insync-3.9.8.60034-fc43.x86_64.rpm
        state: present



  handlers:
    - name: Reload systemd daemon
      listen: Reload systemd
      become: yes
      ansible.builtin.command: systemctl daemon-reload

    - name: Enable battery limit
      listen: Reload systemd
      become: yes
      ansible.builtin.systemd_service:
        name: battery-limit.service
        enabled: true

    - name: Reload udev rules
      listen: Reload udev
      become: yes
      command: udevadm control --reload-rules



  post_tasks:
    - name: Enable systemd services
      become: yes
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        enabled: true
      loop: "{{ enabled_systemd_services }}"


